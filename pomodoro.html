<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  font-family: serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.pomodoro {
  text-align: center;
  background: #faf3e1;
  padding: 20px;
  border-radius: 10px;
}

.time {
  font-size: 50px;
  margin: 20px 0;
}

.controls button {
  font-size: 20px;
  padding: 5px 10px;
  margin: 5px;
  cursor: pointer;
}

button {
  font-family: serif;
  backgroung : white;
  border: 1px solid #000;
  padding: 6px 12px;
  margin: 5px;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover {
  backgroung: white;
}
</style>
</head>

<body>

<div class="pomodoro">
  
  <div> 
    <button onclick="changeTime(-5)">-</button>
    <span id="workTime">30</span>
    <button onclick="changeTime(5)">+</button>
    min
  </div>

  <div class="time" id="display">30:00</div>

  <div class="controls">
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>
  </div>

</div>

<script>
let workMinutes = 30;
let seconds = workMinutes * 60;
let timer = null;

function updateDisplay() {
  let min = Math.floor(seconds / 60);
  let sec = seconds % 60;
  document.getElementById("display").textContent =
    `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function changeTime(value) {
  if (timer) return; // empêche de changer pendant le timer

  workMinutes += value;

  if (workMinutes < 1) workMinutes = 1;

  seconds = workMinutes * 60;
  document.getElementById("workTime").textContent = workMinutes;
  updateDisplay();
}

function startTimer() {
  if (timer) return;

  timer = setInterval(() => {
    seconds--;
    updateDisplay();

    if (seconds <= 0) {
      clearInterval(timer);
      timer = null;
      alert("Temps écoulé !");
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(timer);
  timer = null;
}

function resetTimer() {
  pauseTimer();
  seconds = workMinutes * 60;
  updateDisplay();
}

updateDisplay();
</script>

</body>
</html>
